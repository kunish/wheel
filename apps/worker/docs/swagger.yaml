            type: object
      security:
        - BearerAuth: []
      summary: Refresh model metadata from models.dev
      tags:
        - Models
  /api/v1/model/update:
    post:
      consumes:
        - application/json
      parameters:
        - description: Model ID and optional fields to update
          in: body
          name: body
          required: true
          schema:
            type: object
      produces:
        - application/json
      responses:
        "200":
          description: "{success: true}"
          schema:
            type: object
        "400":
          description: "{success: false, error: string}"
          schema:
            type: object
      security:
        - BearerAuth: []
      summary: Update a model price entry
      tags:
        - Models
  /api/v1/model/update-price:
    post:
      produces:
        - application/json
      responses:
        "200":
          description: "{success: true, data: {synced: int, updated: int}}"
