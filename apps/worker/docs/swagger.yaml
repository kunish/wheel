      produces:
        - application/json
      responses:
        "200":
          description: JSON export file
          schema:
            type: file
      security:
        - BearerAuth: []
      summary: Export all data as JSON file
      tags:
        - Settings
  /api/v1/setting/import:
    post:
      consumes:
